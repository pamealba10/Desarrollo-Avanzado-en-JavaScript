<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumo de APIs - Mundo Mágico de Harry Potter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>⚡ Mundo Mágico de Harry Potter</h1>
        <p class="subtitle">
            <span class="wand">🪄</span> 
            Explora el universo de personajes mágicos 
            <span class="wand">🪄</span>
        </p>
        
        <div class="controls">
            <button class="btn btn-fetch" id="fetchBtn">📡 Obtener con Fetch</button>
            <button class="btn btn-axios" id="axiosBtn">🚀 Obtener con Axios</button>
            <button class="btn btn-clear" id="clearBtn">🗑️ Limpiar</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>🪄 Conjurando personajes del mundo mágico...</p>
        </div>
        
        <div id="data-container">
            <div class="info-text">
                <span class="icon">🪄</span>
                <p>Haz clic en uno de los botones para cargar personajes</p>
                <p class="info-text-lumus" style="font-size: 0.9rem; margin-top: 10px; color: #5a4a7a;">
                    Usa <strong>Fetch</strong> o <strong>Axios</strong> para comparar
                </p>
                <p class="info-text-lumus" style="font-size: 0.8rem; margin-top: 15px; color: #3a2a5a;">
                    ✨ Datos de la API de Harry Potter ✨
                </p>
            </div>
        </div>
    </div>

    <!-- Incluir Axios desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
